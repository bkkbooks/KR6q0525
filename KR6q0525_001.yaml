body:
  text: 嗣法門人慧升集慧渠編慧岱録住辰州府天雲山浦峰寺語録師在卲州金峰青蓮菴受衆護法請於康熙辛亥年十月初一日入院據室師云昔先師於此建立龍山宗旨生擒猛虎活捉獰龍今日棟上座承檀護公請繼主此席且道子承父業一句作麼生道拈拄杖卓一卓云看取令行時江東浦市衆紳士請上堂師拈疏云百千諸佛向一毛端放大光明四十二般若經在諸人舌尖上演出還信得及麼若信不及更請維那宣過宣疏畢師指法座云寶華王座無機不備坐斷古今誰能委悉遂升座拈香云此一瓣香呈祥光於鳳閣結瑞氣於龍樓熱向爐中恭為今上皇帝祝嚴聖壽萬歲萬歲萬萬歲伏願堯風清一統舜日照三千此一瓣香掌邦國之權衡施民間之號令奉為滿朝文武當道勳貴及紳襟士庶等伏願威鎮三楚之上祿位高增光耀五溪之中壽山永固復於懷中拈香云此一瓣香不從他得本自心傳專申供養傳臨濟正宗第三十四世長明炅和尚用酬法乳之恩斂衣就座維那白槌云法筵龍象衆當觀第一義師揮拂云龜毛拂子兔角拄杖橫打直敲當仁不讓還有恁麼人麼僧問學解多聞即不問接引初機事若何師豎拂子示之進云者是禪意如何是經意師云收歸一處進云果然妙句無私屈一踏鴻門兩扇開師云不勞讚歎僧禮拜師云放汝三十棒一僧才出師便喝僧一喝師便打問如何是第一玄師云天上有星皆拱北如何是第二玄師云人間無水不朝東如何是第三玄師云急水灘頭浪拍天問向上宗乘即不問日朗中天事若何師云照臨無私進云只將捉霧拏雲手撥轉靈光耀大千師云重下注腳乃云一毛頭上現無邊身轉大法輪威神自在若說即心即佛節外生枝非心非佛望空啓告不是心不是佛不是物且道是個甚麼喝一喝復舉溈山云一切衆生皆無佛性鹽官云一切衆生皆有佛性師云二老與麼道也是徐六擔板浦峰即不然衆生佛性無蟭螟眼裏翻筋斗衆生佛性有汪洋水底捺葫蘆諸人若向者裏會得許汝參學事畢其或未然兩頭截斷無依倚一個閒人天地間結追云諦觀法王法法王法如是下座結制上堂僧問法幢高豎人天交接如何是浦峰境師云千山聳翠凌霄漢一水中流亙古今如何是和尚家風師云清水白米一任飽餐進云學人久侍巾瓶如何得見性去師云著甚死急僧禮拜師乃云太阿出匣橫挂眉端截斷衆流不通凡聖神光獨耀匝地普天妙用縱橫更無回互直饒釋迦彌勒未敢覷著文殊普賢退身有分到者裏明明絶滲漏了了沒遮攔苟能直下承當珠回玉轉擬涉纖毫白雲萬里喝一喝下座開爐上堂浦峰爐韝今日打開頑銅鈍鐵一任將來山僧不惜腕頭力直教凡胎轉聖胎卓拄杖下座上堂僧問浦峰門庭即不問向上宗乘事若何師云佛眼覷不見進云還許學人會也無師云莫妄想進云寒山逢拾得轉笑轉相親師豎拂子云還逢者個麼僧無語師喝退乃云一毛吞卻山河大地則易山河大地吞卻一毛則難驀豎拄杖云莫有向者裏會得者麼若有則不妨隨緣放曠任性逍遙拈一莖草作丈六金身將丈六金身為一莖草饑鶯爪下奪食猛虎頷下摘鈴如無莫怪山僧粗糙遂旋風打散歸方丈上堂諸方道浦峰如架千鈞之弩一箭射中一群似漫天網水陸空行無處躲避者個說話是則是未免有屈浦峰大衆且道甚處是屈浦峰處卓拄杖云莫將閒學解埋沒祖師心上堂問盡大地是個解脫門把手拽不入未審過在甚麼處師云逼塞虛空進云莫是和尚境界麼師云且莫錯會進云作者好求無病藥師云忌口忌口問學人有一寶毫光燦爛照地輝天請和尚鑑師伸手作接勢僧無語師云卻是一顆魚目乃云只者沒量人作事太莽鹵打殺鱉鼻蛇射透藍田虎大洋海底行須彌頂上舞左右顧視云大衆且道是什麼人行履處檢點得出浦峰明窗淨几安頓上堂僧問昔日世尊拈花迦葉微笑即今和尚又作麼生師豎起拄杖云敲風打雨進云某甲有顆寶珠呈似和尚未審納受否師云試拈出看進云萬仞巖前能撒手千峰頂上現全身師云放汝三十棒乃云十五日已前血流滿地十五日已後皮脫骨露正當十五日把斷要津不通凡聖你諸人作麼生得恰好去謾言博地無尋處馬額驢腮面面逢上堂僧問如何是父母未生前面目師云風吹柳絮毛毬走雨打梨花蛺蝶飛進云踢倒須彌壓碎虛空師云誠希有事也僧禮拜師豎拂子云會麼僧一喝師便打乃云道本無言佛亦何相掀翻野狐窟魔外心膽喪個無面目底舉世無比況拈拄杖卓一卓云大衆且道那個是無面目底芍藥花開菩薩面棕櫚葉散夜叉頭上堂僧問坐斷十方風清月白是如何師云非公境界進云主山高案山低師云著進云浪翻滄海無人識春到雲山花自開師云閒言語問丹霞燒木佛意作麼生師云因寒所逼進云為甚院主眉鬚墮落師云打著南邊動北邊乃云動若行雲止猶谷神不假雕作面目現成驀豎拂子云大衆還見麼一僧出云見師云我何不見又擊禪床云聞麼僧云聞師云我何不聞擲下拂子云觀音妙智力能救世間苦上堂僧問四大本空五蘊非有未審法身在甚麼處師云眼上眉毛橫八字進云開口不見齒伸手不見掌師云瞎問如何是天堂師云擔枷帶鎖進云如何是地獄師云鼓瑟吹笙進云和尚莫顛倒師打云者漆桶乃云萬仞巖前垂手者眼空四海氣壓諸方百尺竿頭進步底橫眠宇宙裕後光前拈拄杖豎起云釋迦老子在山僧拄杖頭上放大光明報道無邊剎海自他不隔於毫端十世古今始終不離於當念諸人還會麼若也會得始識浦峰為人處以拄杖畫一畫云截斷千差路方知出處高復卓一卓解制上堂九旬禁足千巖萬壑露結為霜今朝放開兩粵三湘風行草偃雖然且萬里無寸草處如何話會良久云若到諸方切忌恁麼道怡元禪宿薦受業淡泊師請上堂舉南堂靜云一物長靈甚處安長空雲散碧天寬蓮宮佛剎花無數眨起眉毛子細觀師豎拄杖云淡泊老宿向山僧拄杖頭上道赤灑灑的逍遙自在根塵迥脫靈光獨耀諸人還見麼者裏見得眨上眉毛一任雲散碧天花開佛剎然雖如是且喚什麼作一物長靈喝一喝擲拄杖下座示衆云六根門裏無非古佛家風萬法叢中盡是普賢境界伶俐漢才聞舉著直下更無纖毫過患內不見有我人外不見有凡聖一切處一切時坐斷兩頭古今不易孤迥迥無回互赤灑灑絶羅籠任運騰騰縱橫自在直得與佛祖同一鼻孔出氣所以道若人欲識佛境界當淨其意如虛空遠離妄想及諸取令心所向皆無礙古人傾心吐膽剖腹刳肝只要諸人親到親證浦峰不惜口業恁麼告報直須向言語未形之際朕兆未發之先著得隻眼猶是教乘極則且道衲僧分上又作麼生萬法都來塵不動一超直入如來地拽拄杖歸方丈示衆云猛虎口中奪雀驪龍頷下取珠且道是個什麼人衆無對師云山僧自道去也便下座拈古僧問雲門初秋夏末前程或有人問未審對他道什麼門云大衆退後僧云過在什麼處門云還我九十日飯錢來看風使帆固是跛足阿師隨波逐浪不無者僧若是浦峰待他道還我九十日飯錢來劈面便掌看他雲門怎生合煞者僧若下得者隻手自然通途通轍亦使雲門法道不至有今日也風穴在郢州升座云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是時盧陂長老出問某甲有鐵牛之機請師不搭印穴云慣釣鯨鯢沈巨浸卻將蛙步𩥇泥沙陂佇思穴喝云長老何不進語陂擬議穴便打一拂子云長老還記得話頭麼試舉看陂擬開口穴又打一拂子牧主云將知佛法與王法一般穴云見個什麼道理牧主云當斷不斷返招其亂穴便下座諸方盡道風穴一箭落雙鵰浦峰拄杖子猶未相許在殊不知風穴卻被牧主看破衆中莫有不甘者麼若有出來與拄杖子試道看僧問五祖一大藏教是個切腳未審切那個字祖云鉢羅娘者僧與麼問五祖與麼答且道者僧還曾理會也無者裏有人下得一語恰好天雲山院兩手分付如無參德山小參示衆云老僧今夜不答話問話者三十棒時有僧出禮拜山便打僧云某甲話也未問因甚打某甲山云你甚處人僧云新羅人山云未跨船舷好與三十棒圓明云大小德山龍頭蛇尾德山做處如此可謂觀前顧後為甚圓明道大小德山龍頭蛇尾敢問諸人德山蛇尾龍頭在什麼處者裏如有道得底許汝具衲僧眼如無歸堂喫茶去太原孚上座問鼓山父母未生已前鼻孔在什麼處山云即今生也鼻孔在什麼處孚不肯乃云你問我與你道鼓山問父母未生已前鼻孔在什麼處孚但搖扇而已二老與麼道不妨奇特但父母未生已前的鼻孔何曾夢見設問浦峰父母未生已前鼻孔在什麼處但喚云闍黎他若擬議劈脊便打溈山普請次靜板鳴有一僧拍手呵呵大笑歸去溈山云奇哉此是觀音入理之門至晚問其僧適來你見什麼道理僧云朝來未喫飯聞版聲歡喜溈山云賺殺人者僧朝來未喫飯聞版聲歡喜溈山云賺殺人諸禪德溈山恁麼道許者僧不許者僧者裏檢點得出一任天下橫行僧問鏡清新年頭還有佛法也無清云有僧云如何是新年頭佛法清云元正啓祚僧云謝師答話清云鏡清今日失利又僧問明教新年頭還有佛法也無教云無僧云年年是好年為什麼卻無教云張翁喫酒李翁醉僧云老老大大龍頭蛇尾教云明教今日失利圓悟云鏡清道有也失利明教道無也失利且道淆訛在什麼處若明得去不妨識進退別休咎始知一句下有分身之意有出身之路今日圓悟忽有人問新年頭還有佛法也無對他道不在者兩頭他或道為什麼如此圓悟今日失利且道與古人是同是別鏡清道有錯明教道無錯圓悟道不在者兩頭錯浦峰恁麼批判錯良久云浦峰今日失利僧問長慶如何是合聖之言慶云山僧被闍黎一問直得口似匾檐長慶被者僧一問直得口似匾檐檢點將來長慶心若毒蛇者僧無端受傷至今起身不得正所謂牧童短笛橫牛背不知吹出洞中春玄沙見鼓山來作一圓相山云人人出者個不得沙云情知汝向驢胎馬腹裏作活計山云和尚又作麼生沙云人人出者個不得山云和尚與麼道得某甲卻與麼道不得沙云我得汝不得我得汝不得瞞人昧己驢胎馬腹裏作活情知有分人人出者個不得是甚麼碗脫丘浦峰與麼道當門齒缺僧問石鞏生死到來如何回避鞏云者裏無生死諸仁者還會麼奼女已歸霄漢去呆郎猶向火邊存德山挾復子到溈山上法堂從東過西從西過東溈山默坐不顧德山云無無便下去復云也不得草草遂具威儀見溈山提起坐具云和尚溈山擬取拂子德山便喝當時背法堂著草鞋便去溈山至晚問首座適來新到在什麼處首座云當時背法堂著草鞋便去溈山云還識此子麼已後向孤峰頂上蟠結草菴呵佛罵祖去在德山大似飛騎將軍死中得活溈山雖則坐享太平卻被德山覷破天雲恁麼道一任諸方檢點頌古風幡不是風兮不是幡泉聲鳥語暮雲間誰知八面玲瓏外盤走珠兮珠走盤南嶽讓和尚了知此法實淵源一念無私天地間誰信祖師真實理無言無得古今傳非心非佛朕兆未分前底句個中無相亦無名通身手眼居言外妙手王維畫不成五通仙人問佛試問瞿曇那一通隨呼隨應自圓通直饒句下翻身去未免拋沙墮眼中文殊三處度夏大鵬展翅三千里燕雀蓬棲意自賒舉起金鎚無著處等閒不覺眼生花善財採藥萬紫千紅總是春善財拈弄卻勞神師資相見無多子殺活全彰草一莖舍利弗問月上女驀地相逢便問伊根源本不異毫釐與麼共大涅槃住愛煞張公眼下眉母子産難一顆靈丹濟及時堂堂面目廓無疑豁然桂子月中落笑殺靈山老古錐有無佛性拔出吹毛利劍是非當下截斷五湖四海難藏直透威音那畔趙州訪二菴主隻馬單刀入碧油橫施戈甲好風流等閒勒轉追風驥白牯狸奴一箭收傅大士見武帝衲衣儒履道人冠三度求玄三指南無那梁王渾不薦空亭流水夜潺潺廣額屠兒屠刀擲下萬機忘壁立靈山選佛場一句迥超千聖外眉端燦爛玉毫長若能轉物即同如來若能轉物即如來千聖頂𩕳眼豁開拈起須彌藏芥子全身赤灑玉珠回七處徵心吹毛割開鐵網突出天外之天徵散多聞無一物北斗夜夜面南看八還辨見不見明珠不走盤瞿曇狼籍在西乾個中消息無還處鼻孔何曾失半邊見見之時見非是見見猶離見見不能及空劫圓明本寂然殊形劣相鑑無偏山河大地渾如故莫分梵語及唐言見非見徹底圓到頭無義無文字百千三昧一毫端達磨大師初至金陵見武帝覿面當機絶覆藏廓然無聖對君王只因辜負東君意兩腳蘆花默渡江覓心了不可得覓心不得安心竟穿著惺惺日正中大抵少林深種毒兒孫匝地布春風六祖石墜腰間與麼來碓頭皎皎玉堆堆東山山上傳心洞今古曹源正眼開馬祖鹽醬胡來胡去定干戈四海英靈其奈何從此令行氣息盡不須鹽醬味調和鳥窠吹布毛大用臨機秪自然不從別處起簾纖布毛吹見當人面直下心安絶往還百丈野狐一言諦當絶狐疑就路還家也大奇迷去猶嫌誰揀擇悟來卻信自家癡三千劫外元周固五百生前本不迷從此髑髏情識竭太虛何處著思惟水潦和尚踏倒翻身笑滿腮朦朧心眼豁然開始知百千三昧法總在一毫頭上來南泉水牯牛堂堂揭露一頭牛父子臨機把價酬水草足來頭角現和雲帶月臥林丘盤山見舁喪歌哭未委靈魂往那邊破家散宅徹根源不離當處還鄉里明月依然滿釣灘亮座主當機一拶眼初開放出從前者漢來卻向西山埋姓字不留蹤跡惹人猜吸盡西江水馬師機用獨超然一吸西江徹底乾尋到源頭無一滴龍光直射斗牛寒清源廬陵米曹溪一派水源清到此方知意自深不解廬陵酬米價那能識得飽餐人藥山升座鼓響鐘鳴第二籌刻舟求劍是同流鋒鋩未露如能薦脫體無依法法周趙州問南泉離四句絶百非請師道泉下座歸方丈父慈子孝起家門子卻奪爺家內珍錦繡鴛鴦猶不顧霜天月下覓金針平常心是道一種平常事分明人不知冷泉亭子上空有古人詩祕魔杈急水灘頭把釣鉤煙波深碧一輪秋金鱗不解離鉤意幾喪禹門赤點頭庭前柏樹子庭前柏樹祖師機拄地擎天誰不知當日若逢個毒手和根拔倒上天池溈山踢倒淨瓶全提正令沒人情贏得溈山是淨瓶一腳踢翻歸去也撒開毒氣滿乾坤溈山水牯牛老覺情多慮百年脅書名字為人傳將知徹體風流處寂子無端更著鞭仰山插鍬溈山問處不為多直下承當會也麼掣電光中開正眼摩天俊鷂過新羅臨濟四料揀併總頌奪人不奪境露布錐頭利覿面擬揚眉靠倒在平地奪境不奪人箭穿萬戶春山河及大地白晝也黃昏人境兩俱奪七星光灼灼一箭落雙鵰空王殿誰坐人境俱不奪被此無穿鑿簾捲桃花紅風吹楊柳緑乾坤一色黃金國八表四夷拱帝王海宴河清堯舜日頂門正眼更無雙臨濟三玄三要第一玄拳頭觸破梵王天兩岸山花笑不徹千坐斷月明前第二玄也不方兮也不圓參天一柄龜毛拂橫穿著正偏第三玄寶鏡當臺萬里天任汝神頭又鬼面靈何處躲醜妍第一要戴角毒蛇出閫奧縱橫霹靂海山崩當誰敢立途道第二要正令全提長節操吹毛出鞘耀天地擬議思量血腥漂第三要金剛寶杵無別竅當頭一擊鐵山摧驚落虛空開口笑臨濟四喝臨機四喝鎮威權外道天魔心膽寒掣電光中分皂白毫端影裏納山川臨濟四賓主併總頌賓中賓一杖走紅塵不識玄中旨江山秋又春賓中主拈出一葫蘆機前如不薦烏藤未放汝主中賓兩腳下風塵無私正法眼貴賤一相親主中主山藏戴角虎殺活任縱橫誰敢當頭睹寄言達道者須識自性宗主賓不立處午夜日頭紅牧牛頌撥草尋牛蔓蔓荒草亂煙峰驀直窮源不見蹤踏盡翠崖雲斷處叮嚀又手問山翁驀然見跡忘疲決志不論程花徑幽通過上林忽睹蹄痕新踏處逡巡端在此山深捕步見牛樹裏一聲幽鳥鳴廓然特地露全身誰知渠自不踰矩熟睡元來在故林得牛貫鼻始得今朝見主人扭來鼻孔貫芒繩鞭頭指出家山水兩岸雲收月正明牧護調訓放去收來春月天殷勤牧護古林泉雖然總不傷苗稼水草頻添不記年騎牛歸家特地騎歸來正夜坦然獨步月明中牧童唱出還鄉曲萬里山河一笛風忘牛存人無來無去無東西脫卻煙蓑臥月遲氣息泯然霜夜靜許多清況孰能知人牛雙忘不立功勳一段奇機忘實際少塵泥門前日暖山花發樹倒藤枯鳥不棲返本還源月白風清宇宙寬渠儂得得自閒閒家風舉似同門者日用真機處處圓入廛垂手戴角擎頭意氣雄單拈露柱為人通豁開心眼超群類顯出家風調不同四威儀山中行杜鶻花笑人杖頭挑日月手內握乾坤山中住巍巍不動步小大盡圓融有何不具足山中坐雨打蒼苔破白石演摩訶古今成話墮山中臥石頭枕一個和月帶雲眠萬事都忘卻聯芳偈付殊倫相首座浦峰出個真獅兒露爪張牙步四維遇象逢龍善解吼門庭高設任伊為付崇鑑晟後堂擔囊負鉢有多年便契浦峰一味禪點著通身手眼出提持祖印接高賢付斷疑智侍者侍我杖頭歷有年泥團觸碎受心傳龍天推出龍護大闡宗風辟正偏付宗慶升維那金剛王劍付兒曹殺活全提膽志高龍象齊來俯席下宗風永煽出英豪付天祥禎西堂寶劍拈來付爾揮萬人隊裏顯神威全提正令弘宗旨對御談玄接上機付六融觀悅衆老僧親付一藤杖伏虎降龍任舉唱正眼弘通續我宗兒孫代代傳燈上付閬仙怡知藏立志苦心已有年從斯放下得安然拈來拂子親分付處處逢人把鼻穿付碧巖渠頭陀七斤衫子傳來久付與渠儂老作家一任孤峰鬧市裏罵風呵雨驗龍蛇付如初恆侍者身心放下在其間數載殷勤擊透關今日山僧囑付汝芒鞋竹杖且居山付昶東耀記録浦峰公案妙無言棒棒令人徹骨寒珍重兒曹勤舉用人天瞻仰尚奇巒付宗序原知客曹源一派普天周飲著凡流轉聖流分付當人善守護逢人濟渴解人愁付中山岱書記浦峰辣棒露當陽指示人天不覆藏今日拈來親付汝家聲振振續宗綱
