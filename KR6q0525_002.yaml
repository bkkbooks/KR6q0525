body:
  text: 嗣法門人慧升集慧渠編慧岱録機緣僧問如何是浦峰境師云千竿修竹參差緑掃月披風透碧天曰如何是境中人師云娥眉潭底秦時月突出山僧拄杖頭僧擬議師拈拂子便打僧問如何是佛師云我若向汝說汝還信得及麼曰學人不信爭肯禮拜和尚師云浦峰拄杖今日不開封曰乞和尚慈悲師云情知汝不信僧擬開口師云可知道僧問西來的的大意乞師指示師云喫飯也未曰喫也師云江頭擔柴去貝子王參問如何是明心句師云胡來胡現漢來漢現王曰本命元辰又在甚麼處師顧侍者云捧茶來與大王喫張居士問弟子特來未審和尚將什麼管待師云滿盤栗棘蓬士擬開口師云吞吐不下麼士無語師云莫道山僧無管待法語示斷疑智禪人十二時中不依倚一物由是教乘家活計未為衲僧極則若是個沒量漢直須透頂透底始得智闍黎於此依先師有年勤劬弗怠山僧繼席亦不憚勞蓋因操履真實識見不群行業純熟腳跟穩貼縱橫自在收放自由誠不負出家操道之苦志也珍重示佛旨最禪人學佛祖大道只貴腳跟穩當如靠一座須彌山相似內不見有根塵外不見有凡聖觀三世平等一道清虛如此日益日新久久操煉時節到來心花發現如推門落臼始知者個消息弗從人得本自現成吾其勉之示偈示淨參純禪人參禪貴要自心堅勿逐癡狂入鬧闌十二時中如會得高高心月照無邊示鑑遐昱禪人此事拈來沒甚奇直教用力發真疑一朝黑漆桶底脫須信珠藏內裏衣示大寂定禪人大寂定中非有言太虛無物自如然若知者個真消息任爾施為遍大千示僧遊方大道無分西與東布毛舉起事難通臨行囑汝無多句緊俏草鞋莫放鬆示哲彬禪人看楞嚴經饑則餐兮倦則眠只因早已悟楞嚴八還見處非真見七處心通意了然示崇鑑晟禪人三上明山三上明山不覆藏一朝瞥地始承當橫吹鐵笛千峰外乾屎橛拈遍界香示德融忍禪人阜上清風入竹林溪間明月照幽深輕舟漁父將垂釣驚起獰龍出海門示巨耀烜禪人塵網脫開便是禪鋤頭只把掘心田忽然水到池成處徹底從前一貫穿示古徹清禪人大道寥寥達者稀高人踏著便知機杖頭指出金剛眼萬古晴空絶點翳示中山岱禪人九歲辭親志出家殷勤學道植靈芽根深蒂固枝榮茂覆蔭人天五葉花示大智愚禪人韶光暗度鬢霜班松老雲深鶴自閒悟徹曹溪流水韻本來何處異真顏示志潔瑛禪人青山花綻泄真機匝地周天一段奇珍重常人腳底事鐵鞋踏破了無疑示也菴構禪人祖父門庭不易持兒孫相繼正斯時破沙盆子扶將起道化寰區當爾為示破空麗孫雲門餅子趙州茶喫著通身現爪牙哮吼一聲驚宇宙寰中獨踞驗龍蛇示碧輝明禪人搬柴運水總神通奮力提持莫放鬆一日打穿漆桶底徹頭徹尾露真空示宗鏡覺禪人去去來來心未休擔囊負鉢玩山頭有時行到水窮處始覺騎牛更覓牛示涵輝清孫碧天日朗淨涵輝性地涵輝塵不依鑑地輝天施大用拏龍捉虎顯全機示學智禪人持法華經念念無私轉法華須知火宅駕三車一門超出無岐路寶所分明是我家示李居士持法華經法華轉得自心堅日用尋常無間然念去念來無念念明珠衣裏綻金蓮示不退勇禪人勇向前行不退時吹毛寶劍奮提持任是佛魔難住足機用超群始是奇示佛觀禪德蒲團坐破乾坤小拄杖懸來日月明汝問神通併妙用又是將眉眼上橫示破雲法孫大庾嶺頭提不起今日闍黎已獲披會得趙州洗鉢意衣珠燦爛古今輝示恆杲霖禪德即心即佛盤珠走非佛非心珠走盤若是兩頭俱坐斷紅爐片片雪花鮮示恆高輝禪德心忘情絶迥無依觸著方知底事奇金毛出窟群狐遁縱橫妙用復何疑示靈璧文禪人實處是虛虛處實逆來順去明端的直須除卻句中玄管教出人一頭地示智潭池沙彌小小沙彌志氣昂依師學道越尋常一朝徹見娘生面紹祖傳芳祝我香示大賢尼念頭把定莫他遊十二時中惺惺求徹見娘生真面目拈來法法悉能周示碩菴俊孫割愛辭親到浦峰隨師受業繼師宗從頭徹尾成一貫所向龍從虎亦從示碧峰舁孫萬花開放暮春天鳥語松風唱道玄珍重汝歸休放過勤劬努力種心田示慶生芳孫山自幽兮水自清鳥鳴泉響弄琴音聲聲自合無生旨揭露真機等現成示美菴彥孫爾問西來意若何老僧口謇怕言多青山緑水無施說歷歷明明會也麼示旭菴暉孫父子同來入此山一翻猛力闢荒田清風明月堪為伴雲去雲來得自然示印文策典座三千公案止啼葉八萬行門心外訣但住自家無相位能超一切諸功德示佛果王居士忙閒動靜未曾迷貴在當人㘞地奇一句無私重道破如如不動應來機示堪輿朱居士高觀曠覽審來蹤掌握陰陽造化功試問陰陽不屬地從何下手覓真龍華示裁縫張朝銓幾片青黃赤白雲無情鐵剪巧裁陳就中任爾分長短爭識穿針引線人壽良臣姚居士水自清兮山自秀滿庭黃菊增榮茂拈來慶祝老維摩永證金剛無量壽壽賓實姚居士林巒紫氣靄春風鳥噪玄音花笑容聞見古今元不異長生消息在其中壽佛演法大德桂樹森森妙體彰金風拂拂吐清香當陽指出上人事壽同天地永昌昌贈天祥禎長老出窟金獅露爪牙全威高步踏雲霞千妖百怪潛蹤跡鳳子龍兒任捉拿贈碧巖渠長老浦峰一脈屬兒曹祖令全提正眼高任是獰龍歸足底燈傳奕世啓英豪送秩臣姚學彥赴試桃開浪暖仲春時花雨飛飛點翠枝最喜風雲剛際會錦鱗得意躍龍墀秋日登大朝山訪淨光老宿層巒筆削亙長空嶮巇斜封曲徑通策杖登臨方日午青雲捧出白頭翁偕人龍唐文學坐敘次韻霧斂風清天霽䨑尋幽仙子過橋西山間鳥語分明道勿逐聲香帶水泥送尚玉姚文學儒稱君子獨公賢道脈淵源一貫傳試問當人腳底事行行穩步御階前祈雨拈香口占爐熱栴檀香一橛騰騰瑞氣沖天闕龍王驚起怒風雷直得滂沱降不歇師瘧疾口占寒熱兩重相鬥侵是何神鬼是何精杖頭擊碎渾無物暑往寒來任變更黔陽邑大綸向文學再晤次韻公諱于經本來無物洗何塵結個茅廬遠世名惟喜青雲佳客至擎杯且敘舊時情春日野望遠眺溪山翠欲流俄驚春色上林丘紅紅白白爭時艷誰識乾坤造化由夜坐閲指月録明燈靜夜坐窗前展卷頻頻見昔賢看到德山不語處者回親證祖師禪山堂閒坐三首贏得餘閒寄草堂藤蘿鋪徑鹿為床柴門盡日未常掩風自來兮花自香柴門無鎖有雲封古徑蒼苔少客蹤日出黃蜂穿菊裏夜來明月到窗中古澗層巒碧樹林潺潺流水演玄音晚風相送鴉歸去物外閒僧臥白雲葵花瑤臺花放淡煙輕品冠群芳一段清傲骨不隨風力轉丹心惟向日中傾懷友寥寥飄泊兩心同悵望雲山砌幾重此夜幽窗成獨坐舉頭唯見月華濃詠竹四首龍班鳳尾節交疏正氣森森入畫圓一段風高標雅致肯隨蒲柳遍皇都幾經霜雪幾經春弄月吟風數玉莖不是一翻高直節那能消受歲寒情田卓出緑莖莖幾易春秋未變心節操至今唯爾重清高千古蔭叢林秀發根頭意氣長從來不畏雪風霜雖無桃李爭妍色幸有清標壓海棠雨後野眺雲開石澗廋風定竹林幽目斷清江遠漁舟泊岸頭雨中望鴈塔寺四際空濛雨煙霄接地叢應知山有寺只在白雲中宿香山寺香山留寺古翠竹倚欄柵夜靜無燈火持經對月看贈如初上座浦峰放一箭直射九重殿龍象都收伏逢人穿鼻而雜偈山居十三首年來懶與世奔躔縛個茅廬傍嶽巔離相不拘佛聖戒無心慵論祖師禪林間修竹雲鋪衲澗底擔泉月滿肩除卻現成公案外難將別調寄名賢高枕松窗午夢微覺來山靜客來稀風生竹畔流清韻鳥語枝頭達上機怪石藤蟠龍挂錦奇峰霧靄豹垂衣分明一段天然趣心眼開時幾個知山中無曆渾忘年幾見明窗缺月圓風透體寒嫌衲薄雪殘眼闊愛松堅野雲出岫迷樵徑幽鳥銜花入洞天曲路柴門人罕到拈香擇火自消閒極目林巒春色彰風吹花氣入簾香脫胎竹筍參天杖倚壁藤蘿錦石床報客杜鶻啼蜀魄迷魂仙子夢黃粱勞勞世事如飛電逐影迷頭空感傷萬慮潛消百不知韜光泉石樂無為刪藤刈草培清舍钁霧鋤雲種紫芝火熟芋香思懶贊山晴薇長想夷齊休將世念存毫髮對境忘緣絶是非偶因客問山居意我話幽棲不計年嶺後栽松將合抱檻前插柳可垂肩芒鞋腳底獰龍活拄杖頭邊玉兔懸大道原來無指示莫將往事污心田四壁崚𡾓緑樹彰雨餘春色入虛堂新荷水面連雲翠梅子枝頭帶露黃座上懶將諸佛供胸中直把萬機忘而今覷破勞生夢水際泉聲風韻長萬壑煙雲一柄鋤隨緣日作且安居種松倚翠根宜固愛竹垂陰筍不除性內有天須自覺胸中無字向人書也知近代淳風易世事何堪問古初懶把浮生花甲輪惟於道樂守天真半鐺石煮三更月一钁松裁四季春佛法荒涼因世濫人情寂寞為廚貧幾回笑傲孤峰頂及第心空自主賓山居夜靜轉幽然萬境空閒自在禪黃葉供爐無宿火青香煨鼎有殘煙一簾月色浮天外半嶺松濤落枕邊滿耳盈眸非別物幾多英俊被遮瞞攜將鉢杖挂嵩巔不學諸家五味禪引水澆花清舍外開田種粟野雲邊名賢有意開三徑野老無緣受一廛翻憶古今誰是侶寒山拾得可同傳千峰影裏結蓬茅一念無生萬慮消性地廓然無草穢心田坦蕩絶塵囂月臨霄漢磨天鏡雲走長空識錦袍自是此身閒不徹青山緑水任逍遙草閣玲瓏得自便謾將石鼎煮寒泉乾坤盡在杖頭上日月收歸鉢底邊花燦碧峰裝翠面日穿疏壁照寒肩坦然萬籟咸俱寂贏得風高物外閒登明山寶頂峰高路古砌苔華四顧春輝景物佳雲淡天空明日月風馳草偃走龍蛇林松點翠棲幽鳥澗水流香帶落花採罷紫芝依石坐逸情豈羡泛仙槎明山與友人夜坐惜別爐香斷續晚鐘暹冷露無聲溼翠微素壁燈光浮琥珀疏簾月影映玻璃花開別苑金風爽鶴唳霜天雲夢稀話共知心唯此夕江南江北兩依依除夕自從浪跡走天涯甲乙渾忘屈指推乍見梅開春又到忽聞竹爆歲除來老臨白髮添何易時去黃金換不回珍重兩堂雲水客一年好景付茶杯元旦發筆東來曉日照山堂兀坐齊頭世渾忘爐內添香和案暖池中洗筆帶花香簷前好鳥鳴生滅檻外寒松較短長對境吟哦清興遠少林公案豈囊藏春日尋芳雲淡山空積翠深杖藜緩步出幽林雨餘青嶂煙嵐重水落寒潭日影沉魚躍錦江波砌玉風翻嫩柳葉篩金悠然一笑晴光好無處山河不帶春題浦峰寺蘭若巍峨宋帝封明山秀水護重重三更鳥宿凌雲樹五夜僧敲醒世鐘幻夢須從空裏覺道源宜向靜中逢大開爐韝鎔凡聖祖印單傳正脈通參禪偈參禪本要自心明莫向他人行處尋念起一絲眼著楔腹藏萬卷鏡蒙塵家家戶透長安路處處山含太古春撞遇虛空連架打髑髏乾盡見天真麻陽邑侯陳公過訪次韻公諱五典樹鎖蒼煙澗隔塵蘿龕共坐雨花新成仙作佛無多體治國齊家總一真翰院文明傳道統楚國善政布慈因佇聆丹詔登台輔勿負靈山記莂誠贈宗慶升上座寥寥祖道繼今時正眼弘通屬爾為吹毛殺活勤摩用鉤釣拋垂莫浪施摟碎兔𥥶狐穸種奪來虎穴鳳巢兒聖恩聖德從斯報此是吾家向上機午日二首朱明日正照林端徙倚樓臺對碧瀾龜鼓頻催江上酒龍舟兢畫水中天長吟玉偈逸情遠滿泛霞觴客興寬彩繫五絲垂續命風流不盡萬人歡佳節中天日正長聲聲畫鼓落平江朱樓酒重留人醉碧水舟輕鬥浪狂吐火柘榴紅映彩出波菡萏緑生香從來一味禪風別香積頻頻發上方芭蕉素質參天碧玉莖橫拖青劍倚龍門光浮古幹留雲住影覆苔寒絶鳥痕晚抱麒麟和月臥朝看蝴蝶弄春晴靈根鬱密超群品未許時人取次論代友人一律自歸酉水遠雲林幾度逢春柳綻金門外青山看是舊鏡中白髮鑑來新半生書債餘閒少百代興亡醉夢深遙憶故人湘浦隔濡毫走墨一傳心中秋誰將玉鏡挂蒼窮一片清輝處處同印破水天分上下移將花影轉西東光臨狻兔成胎息影射潛龍起鋭雄萬里山河渾白晝良宵誰不仰高風暮秋有感兀坐江頭對落暉風恬浪靜水聲微深秋紅葉和霜醉薄暮黃花帶露肥白髮誰驚催世夢朱顏那省樂閒機乾坤否泰何堪論我與青山絶是非代僧答文友聖學貴心空心空至理融山川皆道用草木盡文風室朗晴霞照窗虛夜月通毫端生瑞彩直射斗牛宮贈隱者結草雲林下無腔曲自吟彈琴音動指作賦韻勞心竹徑苔痕溼松庭積翠陰山泉饒獨飲誰與漫清纓象山值雪誰把珠璣撒溪山一色妍蒼松成玉樹古壁挂銀箋白象增雄峙虯龍帶暮煙圓明舒一鑑處處兩花天舟中有感飄泊寒江際輕舟慢櫓游春晴開柳眼雲懶臥山頭蝶夢花間醒波光天外浮問豫何所似坦蕩一沙鷗宿玄武宮幾村青嶂外一寺白雲中貝葉翻明月松風度晚鐘茶香忘客倦枕墮得心空夢斷煙霞裏醒來日正東重經青蓮菴此地我居先溪通隱者泉開窗迎白月鑿沼種青蓮徑竹節無改庭松老更堅知君深院裏別有洞中天中秋一輪今夜滿何處不圓明影逐蟬光冷香浮桂魄輕露珠連柏翠潦水共天清此景家家賞誰人識暮晴菊花群芳春兢艷貴種別尋常不逐炎涼變還經歲月長清機凝玉露翠色傲銀霜自識陶潛後逸名遍界香贈隱者結廬人境外盡日少塵鳴澗杳猿聲度林深鳥語穿樹搖青徑柳花發玉池蓮坐待熏風暖支鐺煮瀑泉春日送別友人溪山冰雪瘦送客度平川徑草鋪羅襦藤花插翠鈿舟行殘照裏帆挂夕陽邊此會知何日千江一月圓春日雨霽雨歇泉聲朗風微竹韻清隴頭蛙喚子陌上鳥鳴春蔓草馴蛇性名花恰蝶情乾坤無覆蔽造化坦然平春夜坐清夜涼如洗輕寒入毳衣雲移驚石瘦露重覺花肥鶴唳聞天語猿啼見月輝其間端的旨欲辨已忘機客中阻雨風憂松篁韻雲封野甸迷氣寒花態弱露重柳頭垂世念同冰冷禪心共水棲旅懷何所寄灑墨暫留題春日喜晴四嶂雲開曉寒光逐澗流石林煙氣盡樓閣曙光浮盜果猿搖樹尋香鹿趁丘靜觀時澤潤物物自抽頭獨坐有懷寄黃居士曲徑苔生緑蓬門永日關悠然居世外迥矣別人寰舊識山川阻心知夢往還天台何日晤攜手白雲間夏日寓天龍山林幽山寺古修竹護危墻花雨空中散沉檀室內香野情隨放逸世態任奔忙寂靜無人語鐘聲到上方讚自雕布袋羅漢像讚乾坤法界不可說納向其中無一物十字街頭大打開𦍕頭狗肉誰能別咄咄休怪捏憨布袋裏有彌勒雙桂破山明祖像讚者老漢殺人處極救衆生酒肉裏吞吐佛祖腳跟下鸞翔鳳翥棒頭邊虎驟龍驤鐵稜稜面孔耿落落心腸遍地兒孫覓伊起處不得咄西蜀梁山雙桂堂上自讚咄哉者村漢名不得狀不得畢竟如何施設娥眉潭上已多年貫逐獰龍吞夜月者老漢古怪樣任他讚任他謗不著凡見不住聖相橫打直敲一條白棒逢場作戲當仁不讓呵呵卻被個沒眼波斯東摸西塗喚他做法柱和尚書問謝瀘溪邑侯吳公啓公諱嵩聖道巍峨惟賴英才而治化佛天光耀全希仁善以洪揚起唐虞泰運於斯際家家樂業頌風高鎮華夏安平於此日處處歌揚稱至德不惟紫極注心實乃蒼生拭目恭惟台臺道融三教學富五車列赤幟於詞壇播清名於海甸驅邪遠佞易俗移風拯之水火郊鴻甫巢擁緇流之屏翰龍象奔騰誠哉一路福星久矣萬家生佛棟也山林樗櫟泉石慵愚形尚不中於規繩志豈堪儔於鴻鵠道薄德微學疏才淺飽餐香積至今齒頰生涼寵錫佳章終古名藍絢彩欣觀雲漢之篇已識道隆先哲快誦珠璣之句更聆德配一君佩感無涯衷酬莫罄臨楮瞻依併復併謝復僧書承來翰云業緣所繫山僧三復而三歎然上無攀仰下絶己躬淨裸裸赤灑灑有何繫哉山僧乃棲心於孤峰頂上志泯心灰炊木樝羹煮鐵釘飯以消日也上座忽爾問心乃問是何人心是何物若言是一不應又有問心者若言是二乃元無二古且將甚麼喚作心所以古德云似地擎山不知山之孤峻如石含玉不知玉之無瑕今上座既有向上之志須用智慧之刀斬斷一切獨立於萬仞之上無論是佛是魔一齊勦絶絶後再蘇提持祖印利物維新堪報佛恩始不負出家之志耳依依是復重修浦峰寺序立莖草而建梵剎正眼弘開移片石而得雲饒敏手親切所謂鍛琢金玉須憑良匠之工擁護法幢必假恩檀之力古稱裴公奪笏于石霜蘇子解帶所以道不虛行乘時而合也爰有辰郡勝境浦峰寺曲水拖藍群峰聳翠鍾如是之靈秀産如是之英賢高也明也松風鳥語演不盡之玄音奇哉俊哉蘿月煙雲協無窮之妙旨宛然鷲嶺西開儼若普陀南現嗟吁滄桑之後一片丘墟殿閣樓臺蒼苔疊鎖墻坦戶牖荊棘叢封畫棟傾而鼠雀成巢丹壁頽而狐犴作穴風輪雨矢無日催殘金容敗露人意何安茲略竭以寸忱冀重新而鼎革諒一木之難支思衆擎之易舉仰祈尊官長者達士仁人發難捨能捨之心施極愛所愛之物共勷盛事快睹落成庶使佛日重輝法輪再轉功高德厚注北海以無涯善因樂果積南山而有慶現手眼於當時勒芳名於不朽謹序募修普同塔緣引歷古叢林知識建立法幢激揚宗旨墈龍驗象豎拂拈槌是謂禪宗之極則也然而收骨殮骸普存合塔亦先佛之定製茲以山僧劣志固不敢效古人之大作別展一線風規化道有緣緇素同發盛心多寡施助共成一塔功勒千秋是疏佛事為鐵腳禪德起龕舉火以拄杖擊龕云生也者重關死也者重關打破者重關出頭天外看喝一喝云照顧腳下以杖引行舉起火炬云鐵腳鐵腳踏翻海底掀倒山嶽龍來一拳象來一腳任爾大顯神通不出末後一著攛下火云烈焰光中請君自顧為送拂塵老宿入塔云法法俱圓事事已畢來亦無來去亦無去正體凝然一塵不立山僧如是舉揚猶是者邊底事且道拂塵老宿畢竟向什麼處安身立命以拄杖指塔云團團無縫罅千古立高標為拙之大德起龕下火喝一喝云菩提大道無去來相生死通明了沒遮障咄泥牛舉步超三界木馬追風越十洲以火炬指面云拙之老拙之老一氣不來東歪西倒者個赤肉團作麼生銷繳攛下火云足下紅蓮開燦爛無相光中獨露身法派海慧明常淨通真達本源道弘證佛果紹繼祖燈行狀師諱海棟號法柱姓陳氏先大人名三桂母趙姓澧洲石門人也草齡父母雙逝悉廢儒業至二十五歲因思親恩難報乃棄俗出家往慈利七星山禮長明炅和尚披剃參三不是親炙三載到龍山穎秀師翁座下圓具又隨炅至沅州明山巾瓶七載一日炅問從苗辨地因語識人秪如苗未發生之際語未開口之先作麼生辨得師云不會炅曰汝實不會麼師云一輪明月千峰上古往今來一串穿炅曰又道不會師作禮復隨炅至辰州浦峰寺一日坐次炅曰達磨西來傳個什麼師云路逢毒蛇長千尺腳下翻騰勢轉高炅曰也須喫棒師拂袖便出後一夕聞風動樹鳥作喧洞明此事偶成一偈娘生鼻孔本來長八字打開不覆藏風韻鳥鳴元不異靈靈緊俏絶商量炅曰塞卻鼻孔坐斷舌頭作麼生出氣師云頂門上七縱八橫炅曰放汝三十棒師震威一喝炅亦喝師過前便作掌勢炅謂座元曰此是浦峰第二代主人親炙十有餘載后受記莂往住邵州金峰青蓮菴適因老人示寂歸浦峰收葬事完受請繼席帥衆草載朝夕不怠精勤垂訓遐邇緇素披瀝欽崇提持正令大啓宗猷祥麔威鳳振振繩繩殿閣寮舍俱成大觀裝聖像百有餘尊一切常住諸事具備時年五大六棲心泉石暫截葛藤將院務交付嗣法門人輪住理自此袍道情閒以樂餘年耳康熙辛未歲蒲月夏至前五日刊
